<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webbutik - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>

    <div
      id="products"
      class="pt-5 d-flex flex-wrap justify-content-center align-items-start"
    ></div>

    <div class="modal" id="modal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">
          <div class="modal-header">
            <div class="modal-product text-center">
              <img id="modal-img" class="product-img p-3" src="" alt="" />
              <h5 class="modal-title"></h5>
              <p class="modal-price pt-3"></p>
            </div>
          </div>
          <div class="modal-body">
            <form id="order-form">
              <label id="name-l">Invalid name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Name"
              />
              <label id="email-l">Invalid email</label>
              <input
                type="text"
                id="email"
                class="form-control"
                placeholder="Email"
              />
              <label id="phone-l">Invalid phone</label>
              <input
                type="text"
                id="phone"
                class="form-control"
                placeholder="Phone number"
              />
              <label id="address-l">Invalid address</label>
              <input
                type="text"
                id="address"
                class="form-control"
                placeholder="Address"
              />
              <label id="zipcode-l">Invalid zipcode</label>
              <input
                type="text"
                id="zipcode"
                class="form-control"
                placeholder="Zipcode"
              />
              <label id="city-l">Invalid city</label>
              <input
                type="text"
                id="city"
                class="form-control"
                placeholder="City"
              />
              <button type="submit" class="submit-btn buy btn btn-secondary">
                Place Order
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
